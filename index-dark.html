<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carteira de Investimento - Login</title>
  <link rel="stylesheet" href="styles/style.css">
</head>
<body class="auth-page dark-auth">

  <div class="auth-card">
    <h1>Login</h1>
    <p>Acesse o sistema Carteira de Investimento para acompanhar aportes e visualizar sua carteira.</p>

    <div class="form-group">
      <label for="email">E-mail</label>
      <input type="email" id="email" placeholder="Digite seu e-mail">
    </div>

    <div class="form-group">
      <label for="senha">Senha</label>
      <input type="password" id="senha" placeholder="Digite sua senha">
    </div>

    <a class="btn full" href="src/home-dark.html">Entrar</a>

    <div class="links">
      <a href="src/register-dark.html">Criar conta</a>
      <a href="src/forgot-password-dark.html">Esqueci a senha</a>
    </div>
  </div>

</body>
</html>
