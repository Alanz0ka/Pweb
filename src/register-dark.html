<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carteira de Investimento - Cadastro</title>
  <link rel="stylesheet" href="../styles/style.css">
</head>
<body class="auth-page dark-auth">

  <div class="auth-card">
    <h1>Cadastro</h1>
    <p>Preencha os dados abaixo para criar acesso ao sistema Carteira de Investimento.</p>

    <div class="form-group">
      <label for="nome">Nome</label>
      <input type="text" id="nome" placeholder="Digite seu nome">
    </div>

    <div class="form-group">
      <label for="cad-email">E-mail</label>
      <input type="email" id="cad-email" placeholder="Digite seu e-mail">
    </div>

    <div class="form-group">
      <label for="cad-senha">Senha</label>
      <input type="password" id="cad-senha" placeholder="Digite sua senha">
    </div>

    <div class="form-group">
      <label for="confirmar">Confirmar senha</label>
      <input type="password" id="confirmar" placeholder="Confirme sua senha">
    </div>

    <a class="btn full" href="home-dark.html">Cadastrar</a>

    <div class="links">
      <a href="../index-dark.html">Voltar para login</a>
    </div>
  </div>

</body>
</html>
